# Переключение в dev: helm install -f values.yaml -f values-dev.yaml ...
environment: dev

wordpress:
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  autoscaling:
    enabled: false

mysql:
  persistence:
    size: 3Gi
  # MySQL 8.0 в контейнере при 512Mi часто падает (OOM); 768Mi + performance_schema=OFF обычно хватает
  resources:
    requests:
      memory: "256Mi"
    limits:
      memory: "768Mi"

# Конфиг MySQL для dev: меньше буфер, чтобы не убивало контейнер
mysqlConfig:
  innodbBufferPoolSize: "64M"
  maxConnections: "50"
