# RBAC: пользователь junior-dev — только просмотр логов и списка подов в namespace
# Применить: kubectl apply -f rbac/junior-dev.yaml -n <namespace>
# Проверка: kubectl auth can-i delete pod --as=system:serviceaccount:<namespace>:junior-dev
# Ожидается: no
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: junior-dev
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: junior-dev-view-pods-logs
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: junior-dev-view
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: junior-dev-view-pods-logs
subjects:
  - kind: ServiceAccount
    name: junior-dev
    namespace: default
